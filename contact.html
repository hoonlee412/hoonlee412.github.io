            <section id="contact">
    <h2>Contact Me</h2>
    <p>I'd love to hear from you! Please fill out the form below or get in touch via email or social media.</p>

    <div class="contact-container">
        <div class="form-column">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="button">Send Message</button>
            </form>
        </div>

        <div class="info-column">
            <h3>Contact Information</h3>
            <p><i class="fas fa-envelope"></i> <a href="mailto:hoon.lee.114@gmail.com">hoon.lee.114@gmail.com</a></p>
            <p><i class="fab fa-github"></i> <a href="https://github.com/hoonlee412" target="_blank">GitHub Profile</a></p>
            <p><i class="fab fa-linkedin"></i> <a href="https://linkedin.com/in/your-username" target="_blank">LinkedIn Profile</a></p>
        </div>
    </div>
